# إعداد نشر CloudMenu على Netlify — تطبيق Next.js (SSR) في مجلد web/.
#
# مهم جداً: هذا التطبيق SSR (توجيه ديناميكي + server actions + جلسات)، فلا
# يعمل بالسحب والإفلات (drag & drop). يجب أن يُبنى عبر Netlify المربوط بـ Git
# حتى يُركَّب محوّل Next تلقائياً؛ وإلا تظهر 404 على كل مسار.
#
# base = "web": المشروع في web/، فيبني Netlify هناك دون الحاجة لضبط
# "Base directory" في الواجهة.
#
# publish = ".next" (نسبةً إلى base) هي القيمة القياسية لمشاريع Next.js،
# ونثبّتها صراحةً لتتجاوز أي قيمة خاطئة عالقة في إعدادات الواجهة.
#
# نفرض plugin محوّل Next صراحةً: الاكتشاف التلقائي لا يعمل في هذا الموقع
# (الـAPI العام أظهر plugin_state = none على نشرات ناجحة ظاهرياً لكنها تخدم
# 404 على كل مسار). بدون المحوّل يُنشر .next كملفات خام بلا خادم SSR.
#
# ملاحظة: الموقع المصغّر القديم أُرشِف في legacy/public/ ولم يعد يُنشر.
[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"
