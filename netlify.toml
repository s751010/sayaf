# إعداد Netlify للنسخة الجديدة v2 (app/ → deploy/) — SPA ثابتة تُنشر بالسحب أو بربط Git.
#
# عند ربط المستودع بـ Netlify (استيراد من GitHub) يُبنى تطبيق Vite في app/
# ويُنشر ناتجه من deploy/ — بلا أي متغيرات بيئة (المفاتيح العامة مضمّنة في
# app/src/lib/config.ts). هذا يجعل النشر يعمل مباشرة دون إعداد إضافي.
#
# ملاحظات:
# - النشر اليدوي بالسحب لا يقرأ هذا الملف إطلاقاً: اسحب مجلد deploy/ كاملاً وينتهي.
# - نسخة web/ (Next.js SSR) لا تزال في المستودع كمرجع؛ لنشرها أنشئ موقع Netlify
#   منفصلاً واضبط Base directory = web + متغيرات البيئة في واجهة Netlify.
[build]
  command = "cd app && npm ci && npm run build"
  publish = "deploy"

[build.environment]
  NODE_VERSION = "22"
