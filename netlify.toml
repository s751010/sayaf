# إعداد نشر CloudMenu على Netlify.
#
# المصدر الوحيد للموقع الحيّ هو تطبيق Next.js في مجلد web/، لذلك نضبط
# base = "web" هنا بجذر المستودع. هذا يجعل موقع Netlify المربوط بـ Git يبني
# التطبيق بشكل صحيح حتى لو لم يُضبط "Base directory" في واجهة Netlify —
# وهو أشهر سبب لخطأ "Page not found on every route".
#
# Netlify يكتشف Next.js تلقائياً ويربط runtime الخاص به (يضبط publish dir
# وتوجيه SSR)، لذلك لا نضبط publish أو نثبّت plugin يدوياً.
#
# ملاحظة: الموقع المصغّر القديم أُرشِف في legacy/public/ ولم يعد يُنشر.
[build]
  base = "web"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
