# إعداد Netlify للنسخة الجديدة v2 (app/ → deploy/).
#
# عند ربط المستودع بـ Netlify (استيراد من GitHub) يُبنى تطبيق Vite في app/
# ويُنشر ناتجه من deploy/ — بلا أي متغيرات بيئة (المفاتيح العامة مضمّنة).
#
# ⚠️ مهم: اختر الفرع الصحيح في إعدادات Netlify (Branch to deploy) —
# الفرع الذي يحتوي app/ و deploy/.
#
# ملاحظات:
# - النشر اليدوي بالسحب لا يقرأ هذا الملف إطلاقاً: اسحب مجلد deploy/ كاملاً وينتهي.
# - نسخة web/ (Next.js) لم تعد هدف البناء الافتراضي؛ لنشرها أنشئ موقعاً منفصلاً
#   واضبط Base directory = web يدوياً في واجهة Netlify (مع متغيرات البيئة).
[build]
  command = "cd app && npm ci && npm run build"
  publish = "deploy"

[build.environment]
  NODE_VERSION = "22"
