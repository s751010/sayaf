# Netlify config for the Next.js app (lives in web/).
#
# REQUIRED in the Netlify UI: set "Base directory" = web   (so Netlify reads
# THIS file and builds the app here, not the legacy public/ site at the root).
#
# We intentionally do NOT set `publish` or pin the Next.js plugin: Netlify
# auto-detects Next.js and attaches its runtime (which configures publish +
# SSR routing). Forcing publish=".next" serves raw static files → 404 on every
# route, which is exactly the failure we are fixing here.
[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"
